name: Deploy JUMC IoT Dashboard to GitHub Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:  # Allow manual trigger from GitHub Actions tab

# Sets permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; skip queued runs, keep in-progress
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload site files
        uses: actions/upload-pages-artifact@v3
        with:
          # Deploy all files in root EXCEPT ignored ones
          # config.js is gitignored so it won't be deployed (users enter credentials via UI)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
